# Alembic — migrations de infraestrutura do banco (sob REVISÃO HUMANA, regra backend.md).
# A URL de conexão NÃO fica aqui: vem de app.config.settings (env.py), única fonte de verdade.
[alembic]
script_location = infra/db/migrations
prepend_sys_path = backend
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
