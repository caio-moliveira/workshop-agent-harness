# Alembic — migrations do schema `harness` e do role read-only (issue #16).
# A URL e injetada em runtime pelo env.py a partir de DATABASE_URL (conexao admin RW).
# Migrations vivem em infra/db/migrations (caminho protegido, sob revisao humana).

[alembic]
script_location = infra/db/migrations
prepend_sys_path = .
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
