# nginx — única porta exposta ao host. Serve a SPA (placeholder até a fatia do frontend)
# e faz proxy da API.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health: prova o hop nginx -> api -> postgres.
    location = /health {
        proxy_pass http://api:8000/health;
        proxy_set_header Host $host;
    }

    # Chat: preparado para SSE (fatia do grafo) — sem buffering, conexão mantida aberta.
    location /chat {
        proxy_pass http://api:8000/chat;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA: serve estáticos; rotas do cliente caem no index.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
