# nginx: unica porta exposta ao host (issue #15/#25). Serve a SPA (React+Vite) e faz
# reverse proxy de /chat e /health -> api:8000. Montado/baked via infra/nginx/Dockerfile.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # /chat e streaming (SSE): buffering DESLIGADO, senao o nginx segura os eventos
    # ate o fim e a tela fica parada. HTTP/1.1 + Connection vazio mantem o fluxo aberto.
    location = /chat {
        proxy_pass http://api:8000/chat;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://api:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA: rotas do cliente caem no index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
